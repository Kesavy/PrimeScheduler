<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://p.trellocdn.com https://cdn.paddle.com https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://cdn.jsdelivr.net https://trello-members.s3.amazonaws.com https://trello.com; connect-src 'self' https://prime-scheduler.vercel.app https://trello.com https://api.trello.com; frame-ancestors https://trello.com https://*.trello.com;">
  <title>PrimeScheduler</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
const BACKEND  = 'https://prime-scheduler.vercel.app';
const APP_KEY  = 'e2c0af81ac6b20f973dcb22d8c88f07e';
const ICON_SCHED = 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/calendar-clock.svg';

let _authCache = null;
let _authCacheTs = 0;

async function isAuthorized(t) {
  if (_authCache !== null && Date.now() - _authCacheTs < 60000) return _authCache;
  const v = await t.get('member', 'private', 'pt-authorized');
  _authCache = v === true;
  _authCacheTs = Date.now();
  return _authCache;
}

TrelloPowerUp.initialize({

  // ── Authorization ─────────────────────────────────────────
  'authorization-status': async (t) => {
    const authorized = await t.get('member', 'private', 'pt-authorized');
    return { authorized: authorized === true };
  },

  'show-authorization': (t) => t.popup({
    title:  'Connect PrimeScheduler',
    url:    './authorize.html',
    height: 200,
  }),

  // ── Settings — disconnect account ─────────────────────────
  'show-settings': (t) => t.popup({
    title:  'PrimeScheduler Settings',
    url:    './settings.html',
    height: 160,
  }),

  // ── GDPR: remove member data on request ───────────────────
  'remove-data': async (t) => {
    try {
      const token    = await t.get('member', 'private', 'pt-token');
      const memberId = (await t.member('id')).id;
      if (token && memberId) {
        await fetch(`${BACKEND}/api/revoke`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ memberId, token }),
        }).catch(() => {});
      }
    } catch {}
    await t.set('member', 'private', 'pt-authorized', false);
    await t.set('member', 'private', 'pt-token',      null);
    await t.set('member', 'private', 'pt-jobs',       []);
    _authCache = false;
    _authCacheTs = Date.now();
  },

  // ── Card detail badge ─────────────────────────────────────
  'card-detail-badges': async (t) => {
    const authorized = await isAuthorized(t);
    if (!authorized) {
      return [{
        title:    'PrimeScheduler',
        text:     'Connect to schedule',
        color:    null,
        icon:     ICON_SCHED,
        callback: (t) => t.popup({
          title:  'Connect PrimeScheduler',
          url:    './authorize.html',
          height: 200,
        }),
      }];
    }

    const card    = await t.card('id');
    const jobs    = await t.get('member', 'private', 'pt-jobs') || [];
    const now     = new Date();
    const pending = jobs.filter(j => j.cardId === card.id && new Date(j.sendAt) > now);

    return [{
      title:    'Schedule comment',
      text:     pending.length > 0 ? `${pending.length} scheduled` : 'Schedule',
      color:    pending.length > 0 ? 'purple' : null,
      icon:     ICON_SCHED,
      callback: (t) => t.popup({
        title:  'PrimeScheduler',
        url:    './schedule-popup.html',
        height: 600,
      }),
    }];
  },

  // ── Card button ───────────────────────────────────────────
  'card-buttons': async (t) => {
    const authorized = await isAuthorized(t);
    const card    = await t.card('id');
    const jobs    = await t.get('member', 'private', 'pt-jobs') || [];
    const now     = new Date();
    const pending = jobs.filter(j => j.cardId === card.id && new Date(j.sendAt) > now);
    return [{
      icon:     ICON_SCHED,
      text:     pending.length > 0
                  ? `Schedule comment (${pending.length})`
                  : 'Schedule comment',
      callback: authorized
        ? (t) => t.popup({ title: 'PrimeScheduler', url: './schedule-popup.html', height: 600 })
        : (t) => t.popup({ title: 'Connect PrimeScheduler', url: './authorize.html', height: 200 }),
    }];
  },

}, {
  appKey:  APP_KEY,
  appName: 'PrimeScheduler',
});
</script>
</body>
</html>
