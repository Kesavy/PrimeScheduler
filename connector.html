<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PrimeScheduler</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
const BACKEND  = 'https://prime-scheduler.vercel.app';
const APP_KEY  = 'e2c0af81ac6b20f973dcb22d8c88f07e';
const ICON_SCHED = 'https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/calendar-clock.svg';

async function isAuthorized(t) {
  const v = await t.get('member', 'private', 'pt-authorized');
  return v === true;
}

TrelloPowerUp.initialize({

  // ── Authorization ─────────────────────────────────────────
  'authorization-status': async (t) => {
    const authorized = await t.get('member', 'private', 'pt-authorized');
    return { authorized: authorized === true };
  },

  'show-authorization': (t) => t.popup({
    title:  'Connect PrimeScheduler',
    url:    './authorize.html',
    height: 200,
  }),

  // ── Settings — disconnect account ─────────────────────────
  'show-settings': (t) => t.popup({
    title:  'PrimeScheduler Settings',
    url:    './settings.html',
    height: 160,
  }),

  // ── GDPR: remove member data on request ───────────────────
  'remove-data': (t) => {
    // Must complete synchronously-fast — Trello has 1000ms timeout
    // Fire backend revoke completely async, don't await anything
    t.get('member', 'private', 'pt-token').then(token => {
      t.member('id').then(m => {
        if (token && m && m.id) {
          fetch(`${BACKEND}/api/revoke`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ memberId: m.id, token }),
          }).catch(() => {});
        }
      }).catch(() => {});
    }).catch(() => {});
    // Clear storage — return the Promise so Trello knows when we're done
    return Promise.all([
      t.set('member', 'private', 'pt-authorized', false),
      t.set('member', 'private', 'pt-token', null),
      t.set('member', 'private', 'pt-jobs', []),
    ]);
  },

  // ── Card detail badge ─────────────────────────────────────
  'card-detail-badges': async (t) => {
    const authorized = await isAuthorized(t);
    if (!authorized) {
      return [{
        title:    'PrimeScheduler',
        text:     'Connect to schedule',
        color:    null,
        icon:     ICON_SCHED,
        // Použít show-authorization — Trello po zavření automaticky
        // refreshne authorization-status a tím i card-detail-badges
        callback: (t) => t.showAuthorization(),
      }];
    }

    const card    = await t.card('id');
    const jobs    = await t.get('member', 'private', 'pt-jobs') || [];
    const now     = new Date();
    const pending = jobs.filter(j => j.cardId === card.id && new Date(j.sendAt) > now);

    return [{
      title:    'Schedule comment',
      text:     pending.length > 0 ? `${pending.length} scheduled` : 'Schedule',
      color:    pending.length > 0 ? 'purple' : null,
      icon:     ICON_SCHED,
      callback: (t) => t.popup({
        title:  'PrimeScheduler',
        url:    './schedule-popup.html',
        height: 600,
      }),
    }];
  },

  // ── Card button ───────────────────────────────────────────
  'card-buttons': async (t) => {
    const authorized = await isAuthorized(t);
    const card    = await t.card('id');
    const jobs    = await t.get('member', 'private', 'pt-jobs') || [];
    const now     = new Date();
    const pending = jobs.filter(j => j.cardId === card.id && new Date(j.sendAt) > now);
    return [{
      icon:     ICON_SCHED,
      text:     pending.length > 0
                  ? `Schedule comment (${pending.length})`
                  : 'Schedule comment',
      callback: authorized
        ? (t) => t.popup({ title: 'PrimeScheduler', url: './schedule-popup.html', height: 520 })
        : (t) => t.popup({ title: 'Connect PrimeScheduler', url: './authorize.html', height: 200 }),
    }];
  },

}, {
  appKey:  APP_KEY,
  appName: 'PrimeScheduler',
});
</script>
</body>
</html>
