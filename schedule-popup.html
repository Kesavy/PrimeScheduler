<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PrimeScheduler</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0D0D0F;--s:#16161A;--s2:#1E1E24;--s3:#26262E;
    --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.14);
    --txt:#F0EFE8;--m:#7A7A88;--ac:#6C5CE7;--ac2:#A29BFE;
    --gr:#00B894;--rb:rgba(214,48,49,0.14);--rt:#FF7675;
    --f:'Inter',sans-serif;
  }
  @media(prefers-color-scheme:light){
    :root{
      --bg:#FFFFFF;--s:#F4F5F7;--s2:#EBECF0;--s3:#DFE1E6;
      --b:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.16);
      --txt:#172B4D;--m:#6B778C;--ac:#5243AA;--ac2:#5243AA;
      --gr:#00875A;--rb:rgba(191,38,0,0.10);--rt:#BF2600;
    }
  }
  html{background:var(--bg);overflow:hidden;}
  body{font-family:var(--f);background:var(--bg);color:var(--txt);padding:0;margin:0;overflow:hidden;}

  /* Auth prompt */
  .auth-wrap{padding:14px;}
  .auth-title{font-size:13px;font-weight:600;margin-bottom:6px;}
  .auth-desc{font-size:11px;color:var(--m);line-height:1.5;margin-bottom:12px;}
  .btn-auth{width:100%;padding:10px;background:var(--ac);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;}
  .btn-auth:hover{background:#7C6AF0;}

  /* Card chip */
  .ca{padding:10px 12px 0;}
  .cc{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:5px 9px;margin-bottom:8px;}
  .cd{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;}
  .cn{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Member chip */
  .member-chip{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:6px 9px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;margin-left:0;margin-right:0;}
  .mc-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:white;flex-shrink:0;}
  .mc-name{font-size:12px;font-weight:500;}

  /* Section labels */
  .sl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px;}
  .sec{padding:0 12px 9px;}

  /* Textarea with @mention support */
  .ta-wrap{position:relative;}
  .ta{width:100%;font-family:var(--f);font-size:12px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:8px 9px;color:var(--txt);outline:none;resize:none;height:60px;line-height:1.5;}
  .ta:focus{border-color:var(--ac);}
  .ta::placeholder{color:var(--m);}

  /* @mention dropdown */
  #mention-dropdown{
    display:none;position:absolute;left:0;right:0;
    background:var(--s);border:1px solid var(--b2);border-radius:7px;
    z-index:50;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5);
    max-height:160px;overflow-y:auto;
  }
  #mention-dropdown.open{display:block;}
  #mention-dropdown::-webkit-scrollbar{width:3px;}
  #mention-dropdown::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}
  .mention-item{
    display:flex;align-items:center;gap:8px;
    padding:7px 10px;cursor:pointer;font-size:12px;
    border-bottom:1px solid var(--b);
  }
  .mention-item:last-child{border-bottom:none;}
  .mention-item:hover,.mention-item.active{background:var(--s2);}
  .mention-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:white;flex-shrink:0;}
  .mention-name{font-weight:500;color:var(--txt);}
  .mention-username{color:var(--m);font-size:10px;margin-left:2px;}
  .mention-hint{font-size:10px;color:var(--m);padding:6px 10px;font-style:italic;}

  /* Datetime */
  .dt-hint{font-size:10px;color:var(--m);margin-bottom:8px;}
  .dt-grid{display:grid;grid-template-columns:1fr 68px 68px;gap:6px;margin-bottom:4px;}
  .dt-field{display:flex;flex-direction:column;gap:4px;position:relative;}
  .dt-label{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.07em;font-weight:600;}

  /* Custom select trigger */
  .dt-select-wrap{position:relative;}
  .dt-select-val{font-family:var(--f);font-size:12px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 28px 7px 10px;color:var(--txt);cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dt-select-wrap.open .dt-select-val{border-color:var(--ac);border-radius:0 0 8px 8px;}
  .dt-select-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--m);font-size:10px;}

  /* Dropdown panel */
  .dt-dropdown{display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--s);border:1px solid var(--ac);border-bottom:none;border-radius:10px 10px 0 0;z-index:100;overflow:hidden;}
  .dt-select-wrap.open .dt-dropdown{display:block;}
  .dt-dropdown-inner{max-height:160px;overflow-y:auto;padding:4px 0;}
  .dt-dropdown-inner::-webkit-scrollbar{width:4px;}
  .dt-dropdown-inner::-webkit-scrollbar-track{background:transparent;}
  .dt-dropdown-inner::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px;}
  .dt-dropdown-inner::-webkit-scrollbar-thumb:hover{background:var(--ac);}
  .dt-opt{padding:7px 12px;font-size:12px;color:var(--m);cursor:pointer;transition:background .1s,color .1s;}
  .dt-opt:hover{background:rgba(108,92,231,.12);color:var(--txt);}
  .dt-opt.sel{color:var(--ac2);font-weight:500;}

  /* Send button */
  .btn-send{width:100%;padding:10px;background:var(--ac);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;margin-bottom:6px;}
  .btn-send:hover:not(:disabled){background:#7C6AF0;}
  .btn-send:disabled{opacity:.5;cursor:not-allowed;}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Feedback */
  .feedback{margin:0 10px 8px;padding:8px 10px;border-radius:7px;font-size:11px;font-weight:500;line-height:1.4;display:none;}
  .feedback.ok{display:block;background:rgba(0,184,148,.12);color:var(--gr);border:1px solid rgba(0,184,148,.25);}
  .feedback.err{display:block;background:var(--rb);color:var(--rt);border:1px solid rgba(214,48,49,.22);}

  /* Pending jobs list — scrollable area */
  #jobs-section{border-top:1px solid var(--b);}
  .jobs-title{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.08em;font-weight:600;padding:8px 12px 6px;}
  #jobs-list{max-height:160px;overflow-y:scroll;padding:0 12px 10px;}
  #jobs-list:empty{display:none;}
  #jobs-list::-webkit-scrollbar{width:4px;}
  #jobs-list::-webkit-scrollbar-track{background:transparent;}
  #jobs-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px;}
  #jobs-list::-webkit-scrollbar-thumb:hover{background:var(--ac);}
  .job-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b);}
  .job-item:last-child{border-bottom:none;}
  .job-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);flex-shrink:0;}
  .job-body{flex:1;min-width:0;}
  .job-text{font-size:12px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .job-time{font-size:10px;color:var(--m);margin-top:1px;}
  .job-cancel{background:none;border:none;color:var(--m);cursor:pointer;font-size:15px;padding:1px 4px;border-radius:3px;flex-shrink:0;line-height:1;}
  .job-cancel:hover{background:var(--rb);color:var(--rt);}

  /* Revoke */
  .revoke-row{padding:6px 12px 12px;text-align:center;flex-shrink:0;}

  /* Paywall */
  .paywall{margin:0 12px 10px;padding:14px 14px;background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.3);border-radius:10px;text-align:center;}
  .paywall-title{font-size:13px;font-weight:600;margin-bottom:4px;}
  .paywall-desc{font-size:11px;color:var(--m);margin-bottom:12px;line-height:1.5;}
  .btn-upgrade{background:var(--ac);color:white;border:none;width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;}
  .btn-upgrade:hover{background:#7C6AF0;}
  .btn-revoke{background:none;border:none;color:var(--m);font-size:10px;font-family:var(--f);cursor:pointer;text-decoration:underline;}
  .btn-revoke:hover{color:var(--rt);}
</style>
</head>
<body>

<!-- Auth prompt (shown if not authorized) -->
<div id="auth-section" class="auth-wrap" style="display:none">
  <div class="auth-title">Connect your Trello account</div>
  <div class="auth-desc">PrimeScheduler needs one-time permission to post comments on your behalf at the scheduled time.</div>
  <button class="btn-auth" onclick="doAuth()">Connect account</button>
</div>

<!-- Main UI -->
<div id="main-section" style="display:none;">
  <div class="ca">
    <div class="cc"><div class="cd"></div><div class="cn" id="card-name">Loading…</div></div>
    <div class="member-chip" id="member-chip" style="display:none">
      <div class="mc-av" id="mc-av"></div>
      <div class="mc-name" id="mc-name"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sl">Comment text</div>
    <div class="ta-wrap">
      <textarea class="ta" id="comment-text" placeholder="Write your comment… type @ to mention someone" oninput="onTextInput(event)" onkeydown="onTextKeydown(event)"></textarea>
      <div id="mention-dropdown"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sl">Send at</div>
    <div class="dt-grid">
      <div class="dt-field">
        <span class="dt-label">Day</span>
        <div class="dt-select-wrap" id="wrap-day">
          <div class="dt-select-val" id="val-day" onclick="toggleDt('day')">Today</div>
          <span class="dt-select-arrow">▾</span>
          <div class="dt-dropdown"><div class="dt-dropdown-inner" id="dd-day"></div></div>
        </div>
      </div>
      <div class="dt-field">
        <span class="dt-label">Hour</span>
        <div class="dt-select-wrap" id="wrap-hour">
          <div class="dt-select-val" id="val-hour" onclick="toggleDt('hour')">09</div>
          <span class="dt-select-arrow">▾</span>
          <div class="dt-dropdown"><div class="dt-dropdown-inner" id="dd-hour"></div></div>
        </div>
      </div>
      <div class="dt-field">
        <span class="dt-label">Min</span>
        <div class="dt-select-wrap" id="wrap-min">
          <div class="dt-select-val" id="val-min" onclick="toggleDt('min')">00</div>
          <span class="dt-select-arrow">▾</span>
          <div class="dt-dropdown"><div class="dt-dropdown-inner" id="dd-min"></div></div>
        </div>
      </div>
    </div>
    <div class="dt-hint">Max 7 days ahead · your local timezone</div>
    <button class="btn-send" id="btn-send" onclick="scheduleComment()" disabled>Schedule</button>
  </div>

  <div class="feedback" id="feedback"></div>
  <div id="paywall-section" style="display:none"></div>

  <div id="jobs-section" style="display:none">
    <div class="jobs-title">Scheduled comments</div>
    <div id="jobs-list"></div>
  </div>

  <div class="revoke-row">
    <button class="btn-revoke" onclick="revokeAccess()">Disconnect account</button>
  </div>
</div>

<script>
const BACKEND = 'https://prime-scheduler.vercel.app';
const APP_KEY = 'YOUR_TRELLO_APP_KEY';

const COLORS = ['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#A29BFE','#D63031','#00CEC9'];
function memberColor(id) {
  let h = 0;
  for (const c of String(id)) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(name) {
  const p = (name || '?').trim().split(' ');
  return (p[0][0] + (p[1]?.[0] || '')).toUpperCase();
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' })
       + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

const t = TrelloPowerUp.iframe({ appKey: APP_KEY, appName: 'PrimeScheduler' });

let cardId = '', cardName = '', member = null, boardMembers = [];
let memberPlan = 'free'; // 'free' nebo 'pro'
// @mention state
let mentionStart = -1;   // index in textarea where @ was typed
let mentionQuery = '';
let mentionActive = false;
let mentionIndex = 0;
let filteredMembers = [];

// ── Init ───────────────────────────────────────────────────
async function init() {
  try {
    const [card, board, mbr, authorized] = await Promise.all([
      t.card('id', 'name'),
      t.board('id', 'members'),
      t.member('id', 'fullName', 'username'),
      t.get('member', 'private', 'pt-authorized'),
    ]);

    cardId   = card.id;
    cardName = card.name;
    member   = mbr;
    boardMembers = board.members || [];

    document.getElementById('card-name').textContent = card.name;

    if (authorized !== true) {
      document.getElementById('auth-section').style.display = 'block';
      return;
    }

    showMain();
  } catch (e) {
    document.getElementById('card-name').textContent = 'Error: ' + e.message;
  }
}

function showMain() {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('main-section').style.display = 'block';

  // Member chip
  const chip = document.getElementById('member-chip');
  const av   = document.getElementById('mc-av');
  const nm   = document.getElementById('mc-name');
  if (member) {
    chip.style.display = 'flex';
    av.textContent    = initials(member.fullName);
    av.style.background = memberColor(member.id);
    nm.textContent    = member.fullName;
  }

  // Default datetime: tomorrow, next round hour
  initDatePicker();

  // Načíst plan ze serveru
  loadPlan().then(() => loadJobs());
}

// ── @mention logic ─────────────────────────────────────────
function onTextInput(e) {
  validate();
  const ta    = e.target;
  const val   = ta.value;
  const cursor = ta.selectionStart;

  // Find the @ that triggered the current mention session
  // Walk backwards from cursor to find unbroken word starting with @
  let atPos = -1;
  for (let i = cursor - 1; i >= 0; i--) {
    if (val[i] === '@') { atPos = i; break; }
    if (/\s/.test(val[i])) break;
  }

  if (atPos >= 0) {
    const query = val.slice(atPos + 1, cursor).toLowerCase();
    mentionStart  = atPos;
    mentionQuery  = query;
    mentionActive = true;
    showMentionDropdown(query);
  } else {
    closeMentionDropdown();
  }
}

function onTextKeydown(e) {
  if (!mentionActive) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    mentionIndex = Math.min(mentionIndex + 1, filteredMembers.length - 1);
    renderMentionItems();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    mentionIndex = Math.max(mentionIndex - 1, 0);
    renderMentionItems();
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    if (filteredMembers.length > 0) {
      e.preventDefault();
      insertMention(filteredMembers[mentionIndex]);
    }
  } else if (e.key === 'Escape') {
    closeMentionDropdown();
  }
}

function showMentionDropdown(query) {
  const dd = document.getElementById('mention-dropdown');

  filteredMembers = boardMembers.filter(m =>
    m.fullName.toLowerCase().includes(query) ||
    (m.username || '').toLowerCase().includes(query)
  ).slice(0, 6);

  if (filteredMembers.length === 0) {
    closeMentionDropdown();
    return;
  }

  mentionIndex = 0;
  renderMentionItems();
  dd.classList.add('open');

  // Position dropdown below textarea
  const ta = document.getElementById('comment-text');
  const wrap = ta.parentElement;
  dd.style.top = (ta.offsetTop + ta.offsetHeight + 2) + 'px';
}

function renderMentionItems() {
  const dd = document.getElementById('mention-dropdown');
  dd.innerHTML = filteredMembers.map((m, i) => `
    <div class="mention-item${i === mentionIndex ? ' active' : ''}"
         onmousedown="insertMention(filteredMembers[${i}])">
      <div class="mention-av" style="background:${memberColor(m.id)}">${initials(m.fullName)}</div>
      <span class="mention-name">${m.fullName}</span>
      <span class="mention-username">@${m.username || ''}</span>
    </div>
  `).join('');
}

function insertMention(m) {
  if (!m) return;
  const ta  = document.getElementById('comment-text');
  const val = ta.value;
  const before = val.slice(0, mentionStart);
  const after  = val.slice(ta.selectionStart);
  const insert = `@${m.username || m.fullName} `;
  ta.value = before + insert + after;
  // Move cursor after the inserted mention
  const newPos = before.length + insert.length;
  ta.setSelectionRange(newPos, newPos);
  ta.focus();
  closeMentionDropdown();
  validate();
}

function closeMentionDropdown() {
  mentionActive = false;
  document.getElementById('mention-dropdown').classList.remove('open');
}

// Close dropdown when clicking outside
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('.ta-wrap')) closeMentionDropdown();
});

// ── Validation ─────────────────────────────────────────────
function validate() {
  const text = document.getElementById('comment-text').value.trim();
  const dt   = getPickerDate();
  const ok   = text.length > 0 && dt && dt > new Date();
  document.getElementById('btn-send').disabled = !ok;
}

// ── Schedule ───────────────────────────────────────────────
async function scheduleComment() {
  const text   = document.getElementById('comment-text').value.trim();
  const sendAt = getPickerDate().toISOString();
  const btn    = document.getElementById('btn-send');
  const fb     = document.getElementById('feedback');

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  fb.className = 'feedback';
  fb.style.display = 'none';

  try {
    const token = await t.get('member', 'private', 'pt-token');
    if (!token) throw new Error('Not authorized. Please reconnect your account.');

    const res = await fetch(`${BACKEND}/api/schedule`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        memberId: member.id,
        token,
        cardId,
        cardName,
        text,
        sendAt,
      }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (data.needsAuth) {
        await t.set('member', 'private', 'pt-authorized', false);
        document.getElementById('main-section').style.display = 'none';
        document.getElementById('auth-section').style.display = 'block';
        return;
      }
      throw new Error(data.error || 'Backend error');
    }

    // Ukládat jen minimum — jobId + cardId + sendAt (bez textu = ~60 znaků/job)
    // Při 4096B limitu zvládne ~60 jobů bezpečně
    try {
      const raw = await t.get('member', 'private', 'pt-jobs') || [];
      const now = new Date();
      // Vyhodit prošlé joby
      const fresh = raw.filter(j => new Date(j.sendAt) > now);
      fresh.push({ jobId: data.jobId, cardId, sendAt, text: text.slice(0, 20) });
      await t.set('member', 'private', 'pt-jobs', fresh);
    } catch(e) {
      // Storage plná — reset a ulož jen nový job
      console.warn('pt-jobs storage full, resetting:', e);
      await t.set('member', 'private', 'pt-jobs', [{ jobId: data.jobId, cardId, sendAt, text: text.slice(0, 20) }]);
    }

    document.getElementById('comment-text').value = '';
    btn.textContent = 'Schedule';
    btn.disabled = false;
    fb.textContent = `✓ Scheduled for ${fmtTime(sendAt)}`;
    fb.className   = 'feedback ok';
    validate();
    loadJobs();
  } catch (e) {
    fb.textContent = e.message;
    fb.className   = 'feedback err';
    btn.disabled   = false;
    btn.textContent = 'Schedule';
  }
}

// ── Pending jobs ───────────────────────────────────────────
async function loadJobs() {
  const raw  = await t.get('member', 'private', 'pt-jobs') || [];
  const now  = new Date();
  // Automaticky vyčisti prošlé joby ze storage
  const active = raw.filter(j => new Date(j.sendAt) > now);
  if (active.length < raw.length) await t.set('member', 'private', 'pt-jobs', active).catch(() => {});
  const jobs = active.filter(j => j.cardId === cardId);
  const sec  = document.getElementById('jobs-section');
  const list = document.getElementById('jobs-list');

  if (!jobs.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = jobs
    .sort((a, b) => new Date(a.sendAt) - new Date(b.sendAt))
    .map(j => `
      <div class="job-item">
        <div class="job-dot"></div>
        <div class="job-body">
          <div class="job-text">${(j.text ? (j.text + (j.text.length >= 20 ? '…' : '')) : 'Scheduled comment').replace(/</g,'&lt;')}</div>
          <div class="job-time">${fmtTime(j.sendAt)}</div>
        </div>
        <button class="job-cancel" onclick="cancelJob('${j.jobId}')" title="Cancel">×</button>
      </div>
    `).join('');
  updatePaywall(active.length);
  t.sizeTo('#main-section').catch(() => {});
}

async function cancelJob(jobId) {
  // Optimistic remove from local list
  const jobs = (await t.get('member', 'private', 'pt-jobs') || []).filter(j => j.jobId !== jobId);
  await t.set('member', 'private', 'pt-jobs', jobs);
  loadJobs();
  // Mark cancelled on backend (best-effort — job TTL handles eventual cleanup)
  const token = await t.get('member', 'private', 'pt-token');
  fetch(`${BACKEND}/api/revoke-job`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jobId, memberId: member.id, token }),
  }).catch(() => {});
}

// ── Revoke ─────────────────────────────────────────────────
async function revokeAccess() {
  if (!confirm('Disconnect your Trello account from PrimeScheduler? All pending scheduled comments will be cancelled.')) return;
  try {
    const token = await t.get('member', 'private', 'pt-token');
    await fetch(`${BACKEND}/api/revoke`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ memberId: member.id, token }),
    });
    await t.set('member', 'private', 'pt-authorized', false);
    await t.set('member', 'private', 'pt-token', null);
    await t.set('member', 'private', 'pt-jobs', []);
    document.getElementById('main-section').style.display = 'none';
    document.getElementById('auth-section').style.display = 'block';
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ── Auth redirect ──────────────────────────────────────────
function doAuth() {
  t.popup({ title: 'Connect PrimeScheduler', url: './authorize.html', height: 200 });
}

// ── Plan & paywall ────────────────────────────────────────
async function loadPlan() {
  if (!member) return;
  try {
    const res = await fetch(`${BACKEND}/api/plan?memberId=${member.id}`);
    const data = await res.json();
    memberPlan = data.plan || 'free';
  } catch {
    memberPlan = 'free';
  }
}

function updatePaywall(activeJobCount) {
  const pwSection = document.getElementById('paywall-section');
  const btnSend   = document.getElementById('btn-send');
  const secForm   = document.querySelector('.sec:last-of-type');

  if (memberPlan === 'pro' || activeJobCount < 5) {
    pwSection.style.display = 'none';
    if (btnSend) btnSend.style.display = '';
    return;
  }

  // Limit dosažen — zobrazit paywall
  pwSection.style.display = 'block';
  pwSection.innerHTML = `
    <div class="paywall">
      <div class="paywall-title">Free limit reached</div>
      <div class="paywall-desc">You've used all 5 free scheduled comments.<br>Upgrade to Pro for unlimited scheduling.</div>
      <button class="btn-upgrade" onclick="openUpgrade()">Upgrade to Pro — $4.99/month</button>
    </div>`;
  if (btnSend) btnSend.style.display = 'none';
}

function openUpgrade() {
  const url = `https://kesavy.github.io/PrimeScheduler/?memberId=${member.id}`;
  window.open(url, '_blank');
}

// ── Custom datetime picker ────────────────────────────────
let _dtDay = 0, _dtH = 9, _dtM = 0;

function initDatePicker() {
  const now = new Date();
  _dtH = now.getHours();
  _dtM = Math.ceil((now.getMinutes() + 1) / 5) * 5;
  if (_dtM >= 60) { _dtM = 0; _dtH = (_dtH + 1) % 24; }
  _dtDay = 0;

  // Day options
  const ddDay = document.getElementById('dd-day');
  ddDay.innerHTML = '';
  for (let i = 0; i <= 7; i++) {
    const d = new Date(now); d.setDate(d.getDate() + i);
    const label = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' :
      d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
    const el = document.createElement('div');
    el.className = 'dt-opt' + (i === _dtDay ? ' sel' : '');
    el.textContent = label;
    el.onclick = () => { _dtDay = i; closeDt(); document.getElementById('val-day').textContent = label; validate(); };
    ddDay.appendChild(el);
  }
  document.getElementById('val-day').textContent = 'Today';

  // Hour options
  const ddHour = document.getElementById('dd-hour');
  ddHour.innerHTML = '';
  for (let i = 0; i < 24; i++) {
    const label = String(i).padStart(2, '0');
    const el = document.createElement('div');
    el.className = 'dt-opt' + (i === _dtH ? ' sel' : '');
    el.textContent = label;
    el.onclick = () => { _dtH = i; closeDt(); document.getElementById('val-hour').textContent = label; validate(); };
    ddHour.appendChild(el);
  }
  document.getElementById('val-hour').textContent = String(_dtH).padStart(2,'0');

  // Min options
  const ddMin = document.getElementById('dd-min');
  ddMin.innerHTML = '';
  for (let i = 0; i < 60; i += 5) {
    const label = String(i).padStart(2, '0');
    const el = document.createElement('div');
    el.className = 'dt-opt' + (i === _dtM ? ' sel' : '');
    el.textContent = label;
    el.onclick = () => { _dtM = i; closeDt(); document.getElementById('val-min').textContent = label; validate(); };
    ddMin.appendChild(el);
  }
  document.getElementById('val-min').textContent = String(_dtM).padStart(2,'0');
}

function toggleDt(which) {
  const wraps = ['day','hour','min'];
  wraps.forEach(w => {
    const wrap = document.getElementById('wrap-'+w);
    if (w === which) {
      const isOpen = wrap.classList.contains('open');
      wrap.classList.toggle('open', !isOpen);
      // Scroll selected item into view
      if (!isOpen) {
        const inner = document.getElementById('dd-'+w);
        const sel = inner.querySelector('.sel');
        if (sel) sel.scrollIntoView({ block: 'center' });
      }
    } else {
      wrap.classList.remove('open');
    }
  });
}

function closeDt() {
  ['day','hour','min'].forEach(w => document.getElementById('wrap-'+w).classList.remove('open'));
}

// Close dropdowns on outside click
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('.dt-select-wrap')) closeDt();
});

function getPickerDate() {
  const d = new Date();
  d.setDate(d.getDate() + _dtDay);
  d.setHours(_dtH, _dtM, 0, 0);
  return d;
}

init();
</script>
